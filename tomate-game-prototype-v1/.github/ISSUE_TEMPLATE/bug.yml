name: Bug
description: Signaler un comportement incorrect
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: observed
    attributes:
      label: Comportement observé
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Comportement attendu
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Étapes de reproduction
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environnement
      placeholder: Navigateur, système, appareil
